<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProfitView - Dashboard</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- SIDEBAR -->
    <div id="sidebar"></div>
    <script src="components/sidebar.js"></script>

    <!-- MAIN CONTENT -->
    <main class="main">
      <div class="left-top-column">
        <section class="greeting">
          <div class="avatar">JD</div>
          <div>
            <h5>Hello, John Doe</h5>
            <p>Welcome back, here is your bussiness summary</p>
          </div>
        </section>
        <section class="today-section">
          <div class="section-label">TODAY</div>
          <div class="today-cards">
            <div class="card">
              <div class="card-body">
                <p class="card-title">Total Sales</p>
                <h3>$0.00</h3>
              </div>
            </div>
            <div class="card">
              <div class="card-body">
                <p class="card-title">Estimated Profit</p>
                <h3>$0.00</h3>
              </div>
            </div>
          </div>
        </section>
      </div>
      <div class="right-top-column">
        <div class="card">
          <div class="card-body">
            <p class="card-title">Total Inventory</p>
            <h3>$0.00</h3>
          </div>
        </div>
      </div>
      <div class="left-bottom-column">
        <section>
          <div class="section-label">WEEKLY PERFORMANCE</div>
          <div class="chart-wrapper">
            <canvas id="weeklyChart"></canvas>
          </div>
        </section>
      </div>
      <div class="right-bottom-column">
        <section>
          <div class="section-label">MONTHLY COST</div>
          <div class="chart-wrapper">
            <canvas id="monthlyCostChart"></canvas>
          </div>
        </section>
      </div>
    </main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <script src="js/app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
<div class="left-top-column"></div>
<div class="left-bottom-column"></div>
<div class="right-top-column"></div>
<div class="right-bottom-column"></div>
